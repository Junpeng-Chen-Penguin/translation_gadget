<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>词条翻译</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">翻译工作台</div>
      <nav class="topnav">
        <a class="active" href="index.html">词条翻译</a>
        <a href="lexicon.html">标准词库</a>
      </nav>
      <div class="top-actions"></div>
    </div>
  </header>

  <main class="page-main">
    <section class="panel content-panel split">
      <div class="main-header compact">
        <h1>词条翻译</h1>
        <div class="btn-group">
          <button id="downloadTemplateBtn">下载模板</button>
          <button class="primary" id="aiTranslateBtn">AI翻译</button>
          <button id="testConnectionBtn">连接测试</button>
          <button id="exportResultBtn">导出结果</button>
          <button id="clearEntriesBtn">清空数据</button>
        </div>
      </div>

      <div class="dropzone">
        <div class="upload-icon">↑</div>
        <strong>拖拽 CSV 文件到此处</strong>
        <div class="btn-group" id="chooseActionGroup">
          <button id="chooseFileBtn">选择 CSV 文件</button>
        </div>
        <div class="btn-group" id="selectedActionGroup" style="display:none;">
          <button class="primary" id="parseFileBtn">导入并解析</button>
          <button id="rechooseFileBtn">重新选择</button>
          <button id="removeFileBtn">移除</button>
        </div>
        <input id="csvFileInput" type="file" accept=".csv,text/csv" style="display:none" />
        <div class="hint" id="filePickedHint">未选择文件</div>
      </div>

      <div class="toolbar compact">
          <div class="toolbar-left">
            <input class="search" id="searchInput" placeholder="搜索 key / 词条 / 翻译" />
            <span class="inline-note" id="lexiconHitNote">命中标准词库 0 条</span>
          </div>
        </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 18%;">key</th>
              <th style="width: 18%;">词条</th>
              <th style="width: 18%;">上下文</th>
              <th style="width: 16%;">AI翻译</th>
              <th style="width: 20%;">最终翻译</th>
              <th style="width: 10%;">来源</th>
            </tr>
          </thead>
          <tbody id="entriesTbody">
            <tr>
              <td colspan="6" class="table-empty">
                <div class="table-empty-box">
                  <div class="table-empty-emoji">📄</div>
                  <div class="table-empty-title">还没有翻译词条</div>
                  <div class="table-empty-desc">先选择 CSV 文件并点击“导入并解析”</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="progress-modal-mask" id="translateProgressMask" style="display:none;">
    <div class="progress-modal">
      <div class="progress-modal-title" id="translateProgressTitle">🤖 AI翻译进行中</div>
      <div class="progress-modal-text" id="translateProgressText">正在准备翻译任务...</div>
      <div class="progress-steps">
        <div class="progress-step">
          <div class="progress-step-head">
            <span>1. 标准词库识别</span>
            <span class="progress-step-status" id="translateStep1Status">⏳ 等待中</span>
          </div>
          <div class="progress-step-desc" id="translateStep1Desc">准备识别标准词库命中...</div>
        </div>
        <div class="progress-step">
          <div class="progress-step-head">
            <span>2. AI翻译与语义命中</span>
            <span class="progress-step-status" id="translateStep2Status">⏳ 等待中</span>
          </div>
          <div class="progress-step-desc" id="translateStep2Desc">等待开始...</div>
        </div>
        <div class="progress-step">
          <div class="progress-step-head">
            <span>3. 翻译校对</span>
            <span class="progress-step-status" id="translateStep3Status">⏳ 等待中</span>
          </div>
          <div class="progress-step-desc" id="translateStep3Desc">等待开始...</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-track-bar" id="translateProgressBar"></div>
      </div>
      <div class="progress-modal-percent" id="translateProgressPercent">0%</div>
      <div class="progress-modal-summary" id="translateProgressSummary">📊 结果统计将在翻译完成后显示</div>
      <div class="progress-modal-actions">
        <button class="primary" id="translateProgressConfirmBtn" style="display:none;">确定</button>
      </div>
    </div>
  </div>

  <script>
    const chooseFileBtn = document.getElementById('chooseFileBtn');
    const downloadTemplateBtn = document.getElementById('downloadTemplateBtn');
    const parseFileBtn = document.getElementById('parseFileBtn');
    const aiTranslateBtn = document.getElementById('aiTranslateBtn');
    const testConnectionBtn = document.getElementById('testConnectionBtn');
    const exportResultBtn = document.getElementById('exportResultBtn');
    const clearEntriesBtn = document.getElementById('clearEntriesBtn');
    const rechooseFileBtn = document.getElementById('rechooseFileBtn');
    const removeFileBtn = document.getElementById('removeFileBtn');
    const csvFileInput = document.getElementById('csvFileInput');
    const dropzone = document.querySelector('.dropzone');
    const filePickedHint = document.getElementById('filePickedHint');
    const entriesTbody = document.getElementById('entriesTbody');
    const lexiconHitNote = document.getElementById('lexiconHitNote');
    const searchInput = document.getElementById('searchInput');
    const chooseActionGroup = document.getElementById('chooseActionGroup');
    const selectedActionGroup = document.getElementById('selectedActionGroup');
    const translateProgressMask = document.getElementById('translateProgressMask');
    const translateProgressTitle = document.getElementById('translateProgressTitle');
    const translateProgressText = document.getElementById('translateProgressText');
    const translateStep1Status = document.getElementById('translateStep1Status');
    const translateStep1Desc = document.getElementById('translateStep1Desc');
    const translateStep2Status = document.getElementById('translateStep2Status');
    const translateStep2Desc = document.getElementById('translateStep2Desc');
    const translateStep3Status = document.getElementById('translateStep3Status');
    const translateStep3Desc = document.getElementById('translateStep3Desc');
    const translateProgressBar = document.getElementById('translateProgressBar');
    const translateProgressPercent = document.getElementById('translateProgressPercent');
    const translateProgressSummary = document.getElementById('translateProgressSummary');
    const translateProgressConfirmBtn = document.getElementById('translateProgressConfirmBtn');
    let selectedCsvFile = null;
    let isParsing = false;
    let isExporting = false;
    let searchKeyword = '';
    let loadedRows = [];
    let rowSeq = 1;
    const LARGE_DATASET_THRESHOLD = 500;
    const TRANSLATE_BATCH_SIZE = 30;
    const PROOFREAD_BATCH_SIZE = 50;
    const MAX_LEXICON_ROWS_PER_BATCH = 200;

    // 函数：resetSelectionUI。
    function resetSelectionUI() {
      selectedCsvFile = null;
      csvFileInput.value = '';
      filePickedHint.textContent = '未选择文件';
      chooseActionGroup.style.display = 'flex';
      selectedActionGroup.style.display = 'none';
    }

    // 函数：setParsingState。
    function setParsingState(next) {
      isParsing = Boolean(next);
      parseFileBtn.textContent = isParsing ? '解析中...' : '导入并解析';
      parseFileBtn.disabled = isParsing;
      rechooseFileBtn.disabled = isParsing;
      removeFileBtn.disabled = isParsing;
    }

    // 函数：selectCsvFile。
    function selectCsvFile(file) {
      if (!file) return false;
      const isCsv = file.name.toLowerCase().endsWith('.csv') || file.type === 'text/csv';
      if (!isCsv) {
        alert('仅支持 CSV 文件');
        resetSelectionUI();
        return false;
      }
      selectedCsvFile = file;
      filePickedHint.textContent = `已选择：${file.name} · ${(file.size / 1024).toFixed(1)} KB`;
      chooseActionGroup.style.display = 'none';
      selectedActionGroup.style.display = 'flex';
      return true;
    }

    // 函数：getExportableRows。
    function getExportableRows() {
      return loadedRows.filter((row) => {
        const ai = String(row.aiTranslation || '').trim();
        const finalT = String(row.finalTranslation || '').trim();
        return Boolean(ai || finalT);
      });
    }

    // 函数：updateExportButtonState。
    function updateExportButtonState() {
      if (isExporting) return;
      const exportable = getExportableRows().length;
      exportResultBtn.disabled = exportable === 0;
      exportResultBtn.title = exportable === 0 ? '当前没有可导出的翻译结果' : '';
    }

    // 函数：normalizeText。
    function normalizeText(value) {
      return String(value || '').trim().toLowerCase();
    }

    // 函数：getFilteredRows。
    function getFilteredRows() {
      const kw = normalizeText(searchKeyword);
      if (!kw) return loadedRows;
      return loadedRows.filter((row) => {
        const haystack = [
          row.key,
          row.source,
          row.context,
          row.aiTranslation,
          row.finalTranslation
        ].map(normalizeText).join('\n');
        return haystack.includes(kw);
      });
    }

    // 函数：renderCurrentRows。
    function renderCurrentRows() {
      renderRows(getFilteredRows());
    }

    // 函数：escapeHtml。
    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 函数：buildRowDedupeKey。
    function buildRowDedupeKey(row) {
      const key = String(row?.key || '').trim();
      const source = String(row?.source || '').trim();
      const context = String(row?.context || '').trim();
      return [key, source, context].join('\u0001');
    }

    // 函数：ensureRowId。
    function ensureRowId(row) {
      if (!row || row.__id) return row;
      row.__id = `r${rowSeq++}`;
      return row;
    }

    // 轻量 CSV 解析器：用于导入与导出模板，支持引号字段。
    // 函数：parseCsv。
    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"' && inQuotes && next === '"') {
          field += '"';
          i++;
          continue;
        }
        if (ch === '"') {
          inQuotes = !inQuotes;
          continue;
        }
        if (ch === ',' && !inQuotes) {
          row.push(field);
          field = '';
          continue;
        }
        if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(field);
          field = '';
          if (row.some((v) => String(v).trim() !== '')) rows.push(row);
          row = [];
          continue;
        }
        field += ch;
      }
      row.push(field);
      if (row.some((v) => String(v).trim() !== '')) rows.push(row);
      return rows;
    }

    // 函数：toCsvField。
    function toCsvField(value) {
      const text = String(value ?? '');
      if (/[",\n\r]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }
      return text;
    }

    // 函数：headerIndex。
    function headerIndex(headers, candidates) {
      const normalized = headers.map((h) => String(h).trim().toLowerCase());
      for (const key of candidates) {
        const idx = normalized.indexOf(key);
        if (idx >= 0) return idx;
      }
      return -1;
    }

    // 函数：buildEmptyState。
    function buildEmptyState(emoji, title, desc) {
      return `
        <tr>
          <td colspan="6" class="table-empty">
            <div class="table-empty-box">
              <div class="table-empty-emoji">${emoji}</div>
              <div class="table-empty-title">${title}</div>
              <div class="table-empty-desc">${desc}</div>
            </div>
          </td>
        </tr>
      `;
    }

    // 渲染表格行，并绑定“最终翻译”输入事件。
    // 函数：renderRows。
    function renderRows(rows) {
      if (!rows.length) {
        if (normalizeText(searchKeyword)) {
          entriesTbody.innerHTML = buildEmptyState('🔎', '没有匹配结果', '请尝试更换关键词');
        } else {
          entriesTbody.innerHTML = buildEmptyState('🗂️', '文件中没有可用数据', '请检查 CSV 内容后重试');
        }
        lexiconHitNote.textContent = '命中标准词库 0 条';
        updateExportButtonState();
        return;
      }

      entriesTbody.innerHTML = rows.map((r) => {
        ensureRowId(r);
        const key = escapeHtml(r.key);
        const source = escapeHtml(r.source);
        const context = escapeHtml(r.context);
        const aiText = escapeHtml(r.aiTranslation || '-');
        const rowId = escapeHtml(r.__id);
        const sourceTag = r.translationSource === 'lexicon'
          ? '<span class="tag">标准词库命中</span>'
          : r.translationSource === 'ai'
            ? '<span class="tag neutral">AI翻译</span>'
            : '<span class="tag neutral">待翻译</span>';
        return `
          <tr>
            <td class="cell-key">${key}</td>
            <td class="cell-multiline">${source}</td>
            <td class="cell-multiline">${context}</td>
            <td class="cell-multiline">${aiText}</td>
            <td>
              <textarea class="cell-textarea final-translation-input" data-row-id="${rowId}" rows="2">${escapeHtml(r.finalTranslation || '')}</textarea>
            </td>
            <td class="cell-source-tag">${sourceTag}</td>
          </tr>
        `;
      }).join('');

      const inputs = document.querySelectorAll('.final-translation-input');
      inputs.forEach((input) => {
        input.addEventListener('input', (e) => {
          const rowId = e.target.getAttribute('data-row-id');
          const row = loadedRows.find((it) => it.__id === rowId);
          if (row) row.finalTranslation = e.target.value;
        });
      });
      const hitCount = loadedRows.filter((r) => r.translationSource === 'lexicon').length;
      lexiconHitNote.textContent = `命中标准词库 ${hitCount} 条`;
      updateExportButtonState();
    }

    // 按 key+source+context 合并：保留已有记录，仅追加未出现的记录。
    // 函数：dedupeRows。
    function dedupeRows(baseRows, incomingRows) {
      const map = new Map();
      const toKey = (r) => buildRowDedupeKey(r);

      baseRows.forEach((r) => {
        ensureRowId(r);
        map.set(toKey(r), r);
      });
      incomingRows.forEach((r) => {
        const k = toKey(r);
        if (!map.has(k)) {
          ensureRowId(r);
          map.set(k, r);
        }
      });
      return Array.from(map.values());
    }

    // 函数：normalizeOpenAIResponseText。
    function normalizeOpenAIResponseText(content) {
      const raw = String(content || '').trim();
      if (!raw) return '[]';
      if (raw.startsWith('```')) {
        const cleaned = raw.replace(/^```[a-zA-Z]*\n?/, '').replace(/\n?```$/, '');
        return cleaned.trim();
      }
      return raw;
    }

    // 函数：showTranslateProgress。
    function showTranslateProgress() {
      translateProgressMask.style.display = 'flex';
      translateProgressTitle.textContent = '🤖 AI翻译进行中';
      translateProgressText.textContent = '正在准备翻译任务...';
      translateStep1Status.textContent = '⏳ 等待中';
      translateStep1Desc.textContent = '准备识别标准词库命中...';
      translateStep2Status.textContent = '⏳ 等待中';
      translateStep2Desc.textContent = '等待开始...';
      translateStep3Status.textContent = '⏳ 等待中';
      translateStep3Desc.textContent = '等待开始...';
      translateProgressBar.style.width = '0%';
      translateProgressPercent.textContent = '0%';
      translateProgressSummary.textContent = '📊 结果统计将在翻译完成后显示';
      translateProgressConfirmBtn.style.display = 'none';
    }

    // 函数：hideTranslateProgress。
    function hideTranslateProgress() {
      translateProgressMask.style.display = 'none';
    }

    // 按步骤更新进度，避免第二步完成时进度条提前到 100%。
    // 函数：updateTranslateProgressByPhase。
    function updateTranslateProgressByPhase(phase, done, total, message) {
      const safeTotal = Math.max(1, Number(total || 0));
      const safeDone = Math.max(0, Math.min(Number(done || 0), safeTotal));
      const ratio = safeDone / safeTotal;
      let percent = 0;
      if (phase === 'step1') {
        percent = Math.round(30 * ratio);
      } else if (phase === 'step2') {
        percent = Math.round(30 + 55 * ratio);
      } else if (phase === 'step3') {
        percent = Math.round(85 + 15 * ratio);
      } else {
        percent = Math.round(100 * ratio);
      }
      const safePercent = Math.max(0, Math.min(percent, 100));
      translateProgressBar.style.width = `${safePercent}%`;
      translateProgressPercent.textContent = `${safePercent}%`;
      translateProgressText.textContent = message || `已完成 ${safeDone}/${safeTotal}`;
    }

    // 函数：normalizeTranslationMatch。
    function normalizeTranslationMatch(text) {
      return String(text || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ');
    }

    // 函数：toHanCharSet。
    function toHanCharSet(text) {
      const chars = String(text || '').match(/[\u4e00-\u9fff]/g) || [];
      return new Set(chars);
    }

    // 函数：hasHighHanOverlap。
    function hasHighHanOverlap(aSet, bSet) {
      if (!aSet.size || !bSet.size) return false;
      let overlap = 0;
      aSet.forEach((ch) => {
        if (bSet.has(ch)) overlap++;
      });
      return overlap > 0 && overlap / Math.min(aSet.size, bSet.size) >= 0.5;
    }

    // 为当前 AI 批次挑选相关词库子集，减少提示词 token 消耗。
    // 函数：pickRelevantLexiconRows。
    function pickRelevantLexiconRows(batchRows, lexiconRows) {
      if (!Array.isArray(batchRows) || !batchRows.length) return [];
      if (!Array.isArray(lexiconRows) || !lexiconRows.length) return [];

      const batchSignals = batchRows.map((row) => {
        const source = String(row?.source || '').trim();
        const context = String(row?.context || '').trim();
        const joined = `${source} ${context}`.toLowerCase();
        return {
          joined,
          hanSet: toHanCharSet(joined)
        };
      });

      const picked = [];
      for (const item of lexiconRows) {
        const sourceText = String(item?.source_text || '').trim();
        const translationEn = String(item?.translation_en || '').trim();
        if (!sourceText || !translationEn) continue;
        const needle = sourceText.toLowerCase();
        const needleHanSet = toHanCharSet(needle);

        const matched = batchSignals.some((signal) => {
          if (signal.joined.includes(needle)) return true;
          return hasHighHanOverlap(signal.hanSet, needleHanSet);
        });
        if (matched) {
          picked.push({ source_text: sourceText, translation_en: translationEn });
          if (picked.length >= MAX_LEXICON_ROWS_PER_BATCH) break;
        }
      }
      return picked;
    }

    // 调用本地代理接口：由代理组装最终 Prompt 并转发到上游模型。
    // 函数：translateWithOpenAI。
    async function translateWithOpenAI(rows, lexiconRows) {
      const payloadRows = rows.map((r) => ({ key: r.key, source_text: r.source, context_info: r.context }));
      const resp = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: payloadRows, lexicon_rows: lexiconRows || [] })
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`AI 接口失败：${resp.status} ${errText}`);
      }

      const data = await resp.json();
      const content = data?.content || '';
      const normalized = normalizeOpenAIResponseText(content);
      const parsed = JSON.parse(normalized);
      return Array.isArray(parsed) ? parsed : [];
    }

    // 调用本地代理接口：对 AI 已翻译结果做一致性校对。
    // 函数：proofreadWithOpenAI。
    async function proofreadWithOpenAI(rows, lexiconRows) {
      const payloadRows = rows.map((r) => ({
        key: r.key,
        source_text: r.source,
        context_info: r.context,
        draft_translation: r.aiTranslation || ''
      }));
      const resp = await fetch('/api/proofread', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rows: payloadRows, lexicon_rows: lexiconRows || [] })
      });

      if (!resp.ok) {
        const errText = await resp.text();
        throw new Error(`AI 校对接口失败：${resp.status} ${errText}`);
      }

      const data = await resp.json();
      const content = data?.content || '';
      const normalized = normalizeOpenAIResponseText(content);
      const parsed = JSON.parse(normalized);
      return Array.isArray(parsed) ? parsed : [];
    }

    // 函数：chunkRows。
    function chunkRows(rows, size) {
      const chunks = [];
      for (let i = 0; i < rows.length; i += size) {
        chunks.push(rows.slice(i, i + size));
      }
      return chunks;
    }

    // 读取系统词库：用于本地直命中和 AI 约束注入。
    // 函数：getServerLexiconRows。
    async function getServerLexiconRows() {
      try {
        const resp = await fetch('/api/lexicon');
        if (!resp.ok) return [];
        const data = await resp.json();
        const arr = Array.isArray(data?.rows) ? data.rows : [];
        return arr
          .map((item) => ({
            source_text: (item?.source_text || item?.source || '').trim(),
            translation_en: (item?.translation_en || item?.translation || '').trim()
          }))
          .filter((item) => item.source_text && item.translation_en);
      } catch (_) {
        return [];
      }
    }

    chooseFileBtn.addEventListener('click', () => {
      csvFileInput.click();
    });

    downloadTemplateBtn.addEventListener('click', () => {
      const header = ['key', 'source_text', 'context_info'];
      const csvContent = `${header.join(',')}\n`;
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'i18n_import_template.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    rechooseFileBtn.addEventListener('click', () => {
      if (isParsing) return;
      csvFileInput.click();
    });

    removeFileBtn.addEventListener('click', () => {
      if (isParsing) return;
      resetSelectionUI();
    });

    csvFileInput.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      selectCsvFile(file);
    });

    if (dropzone) {
      dropzone.addEventListener('dragover', (event) => {
        event.preventDefault();
        event.dataTransfer.dropEffect = 'copy';
        dropzone.classList.add('dragover');
      });
      dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover');
      });
      dropzone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropzone.classList.remove('dragover');
        if (isParsing) return;
        const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
        selectCsvFile(file);
      });
    }

    parseFileBtn.addEventListener('click', () => {
      if (!selectedCsvFile) {
        alert('请先选择 CSV 文件');
        return;
      }
      if (isParsing) return;
      setParsingState(true);

      const reader = new FileReader();
      reader.onload = () => {
        const content = String(reader.result || '');
        const matrix = parseCsv(content);
        if (matrix.length < 2) {
          entriesTbody.innerHTML = buildEmptyState('⚠️', 'CSV 数据不足', '请检查文件是否包含表头和数据行');
          setParsingState(false);
          return;
        }

        const headers = matrix[0];
        const dataRows = matrix.slice(1);

        const keyIdx = headerIndex(headers, ['key', '词条key', '词条_key']);
        const sourceIdx = headerIndex(headers, ['source_text', 'source', '词条', '中文词条', 'text']);
        const contextIdx = headerIndex(headers, ['context_info', 'context', '上下文', '场景']);

        if (keyIdx < 0 || sourceIdx < 0 || contextIdx < 0) {
          alert('CSV 缺少必填列：key/source_text/context_info（支持常见中文别名）');
          entriesTbody.innerHTML = buildEmptyState('🧩', 'CSV 列不匹配', '请确认包含 key、source_text、context_info');
          setParsingState(false);
          return;
        }

        const rows = dataRows
          .map((cols) => ({
            key: (cols[keyIdx] || '').trim(),
            source: (cols[sourceIdx] || '').trim(),
            context: (cols[contextIdx] || '').trim(),
          }))
          .filter((r) => r.key || r.source || r.context);

        const beforeCount = loadedRows.length;
        loadedRows = dedupeRows(loadedRows, rows);
        const addedCount = loadedRows.length - beforeCount;
        renderCurrentRows();
        if (loadedRows.length >= LARGE_DATASET_THRESHOLD) {
          alert(`导入完成：新增 ${addedCount} 条，去重后共 ${loadedRows.length} 条\n数据量较大，AI 翻译将自动分批处理，请耐心等待。`);
        } else {
          alert(`导入完成：新增 ${addedCount} 条，去重后共 ${loadedRows.length} 条`);
        }
        resetSelectionUI();
        setParsingState(false);
      };
      reader.onerror = () => {
        alert('文件解析失败，请重试');
        setParsingState(false);
      };
      reader.readAsText(selectedCsvFile, 'utf-8');
    });

    // 两阶段翻译：
    // 1）先做标准词库本地直命中
    // 2）仅对剩余未命中词条走 AI 翻译
    aiTranslateBtn.addEventListener('click', async () => {
      if (!loadedRows.length) {
        alert('请先导入词条后再执行翻译');
        return;
      }
      const originalText = aiTranslateBtn.textContent;
      aiTranslateBtn.disabled = true;
      aiTranslateBtn.textContent = '翻译中...';
      showTranslateProgress();
      try {
        const lexiconRows = await getServerLexiconRows();
        const lexiconMap = {};
        lexiconRows.forEach((item) => {
          lexiconMap[item.source_text] = item.translation_en;
        });

        const unresolved = [];
        loadedRows.forEach((row) => {
          const hit = lexiconMap[(row.source || '').trim()];
          if (hit) {
            row.aiTranslation = hit;
            if (!row.finalTranslation) row.finalTranslation = hit;
            row.translationSource = 'lexicon';
          } else {
            unresolved.push(row);
          }
        });
        const totalRows = loadedRows.length;
        const exactHitCount = totalRows - unresolved.length;
        translateStep1Status.textContent = `✅ 已完成（${exactHitCount}条）`;
        translateStep1Desc.textContent = `标准词库直命中 ${exactHitCount}/${totalRows} 条`;
        updateTranslateProgressByPhase('step1', 1, 1, `📚 标准词库已命中 ${exactHitCount} 条，AI 继续处理中...`);

        let semanticLexiconHitCount = 0;
        let aiOutputCount = 0;
        const lexiconTranslationSet = new Set(
          lexiconRows.map((row) => normalizeTranslationMatch(row.translation_en))
        );

        if (unresolved.length) {
          translateStep2Status.textContent = '🚀 进行中';
          translateStep2Desc.textContent = `AI 待翻译 ${unresolved.length} 条，正在处理...`;
          translateStep3Status.textContent = '⏳ 等待中';
          translateStep3Desc.textContent = '等待第二步完成后开始...';
          const batches = chunkRows(unresolved, TRANSLATE_BATCH_SIZE);
          for (let i = 0; i < batches.length; i++) {
            const batch = batches[i];
            const finishedCount = i * TRANSLATE_BATCH_SIZE;
            aiTranslateBtn.textContent = `翻译中...(${finishedCount}/${unresolved.length})`;
            const batchLexiconRows = pickRelevantLexiconRows(batch, lexiconRows);
            const aiResults = await translateWithOpenAI(batch, batchLexiconRows);
            const resultMap = {};
            aiResults.forEach((r) => {
              if (r && r.key) resultMap[String(r.key)] = String(r.translation || '').trim();
            });
            batch.forEach((row) => {
              const t = resultMap[row.key] || '';
              row.aiTranslation = t || row.aiTranslation || '';
              if (!row.finalTranslation) row.finalTranslation = row.aiTranslation;
              row.translationSource = row.aiTranslation ? 'ai' : (row.translationSource || '');
              if (t) {
                aiOutputCount++;
                if (lexiconTranslationSet.has(normalizeTranslationMatch(t))) {
                  semanticLexiconHitCount++;
                }
              }
            });
            const aiDoneCount = Math.min((i + 1) * TRANSLATE_BATCH_SIZE, unresolved.length);
            translateStep2Desc.textContent = `AI 已处理 ${aiDoneCount}/${unresolved.length} 条，语义命中标准词库 ${semanticLexiconHitCount} 条`;
            updateTranslateProgressByPhase('step2', aiDoneCount, unresolved.length, `🚀 AI 已完成 ${aiDoneCount}/${unresolved.length} 条`);
          }

          const aiTranslatedRows = unresolved.filter((row) => String(row.aiTranslation || '').trim());
          if (aiTranslatedRows.length) {
            translateStep3Status.textContent = '🛠️ 进行中';
            translateStep3Desc.textContent = `翻译校对中 0/${aiTranslatedRows.length} 条...`;
            try {
              updateTranslateProgressByPhase('step3', 0, aiTranslatedRows.length, `🛠️ 翻译校对中 0/${aiTranslatedRows.length} 条...`);
              const proofreadBatches = chunkRows(aiTranslatedRows, PROOFREAD_BATCH_SIZE);
              for (let i = 0; i < proofreadBatches.length; i++) {
                const batch = proofreadBatches[i];
                const batchLexiconRows = pickRelevantLexiconRows(batch, lexiconRows);
                const proofreadResults = await proofreadWithOpenAI(batch, batchLexiconRows);
                const resultMap = {};
                proofreadResults.forEach((r) => {
                  if (r && r.key) resultMap[String(r.key)] = String(r.translation || '').trim();
                });
                batch.forEach((row) => {
                  const revised = String(resultMap[row.key] || '').trim();
                  if (!revised) return;
                  const oldAi = String(row.aiTranslation || '').trim();
                  row.aiTranslation = revised;
                  if (!row.finalTranslation || String(row.finalTranslation || '').trim() === oldAi) {
                    row.finalTranslation = revised;
                  }
                  row.translationSource = 'ai';
                });
                const proofreadDone = Math.min((i + 1) * PROOFREAD_BATCH_SIZE, aiTranslatedRows.length);
                translateStep3Desc.textContent = `翻译校对中 ${proofreadDone}/${aiTranslatedRows.length} 条`;
                updateTranslateProgressByPhase('step3', proofreadDone, aiTranslatedRows.length, `🛠️ 翻译校对中 ${proofreadDone}/${aiTranslatedRows.length} 条...`);
              }
              translateStep3Status.textContent = '✅ 已完成';
              translateStep3Desc.textContent = `翻译校对完成，共处理 ${aiTranslatedRows.length} 条`;
            } catch (proofreadErr) {
              translateStep3Status.textContent = '⚠️ 已跳过';
              translateStep3Desc.textContent = `校对阶段跳过：${proofreadErr.message || proofreadErr}`;
              updateTranslateProgressByPhase('step3', 1, 1, `⚠️ 校对阶段跳过，已保留首轮翻译结果`);
            }
          } else {
            translateStep3Status.textContent = '✅ 无需执行';
            translateStep3Desc.textContent = '无可校对项';
            updateTranslateProgressByPhase('step3', 1, 1, '✅ 无需校对，已完成');
          }

          semanticLexiconHitCount = unresolved.filter((row) => {
            const t = String(row.aiTranslation || '').trim();
            return Boolean(t) && lexiconTranslationSet.has(normalizeTranslationMatch(t));
          }).length;
          aiOutputCount = unresolved.filter((row) => String(row.aiTranslation || '').trim()).length;
          translateStep2Status.textContent = `✅ 已完成（语义命中 ${semanticLexiconHitCount} 条）`;
        } else {
          translateStep2Status.textContent = '✅ 无需执行';
          translateStep2Desc.textContent = '所有词条均已由标准词库直命中，无需 AI 翻译';
          translateStep3Status.textContent = '✅ 无需执行';
          translateStep3Desc.textContent = '无可校对项';
          updateTranslateProgressByPhase('step3', 1, 1, '✅ 所有步骤已完成');
        }

        renderCurrentRows();
        const aiNetNewCount = Math.max(aiOutputCount - semanticLexiconHitCount, 0);
        translateProgressSummary.textContent = `📊 直命中 ${exactHitCount} 条｜语义命中 ${semanticLexiconHitCount} 条｜AI新增翻译 ${aiNetNewCount} 条`;
        translateProgressTitle.textContent = '✅ AI翻译完成';
        translateProgressText.textContent = '翻译任务已完成，请确认后关闭弹窗。';
        translateProgressConfirmBtn.style.display = 'inline-flex';
        updateTranslateProgressByPhase('step3', 1, 1, '✅ 翻译与校对已完成');
      } catch (err) {
        translateProgressTitle.textContent = '❌ AI翻译失败';
        translateStep2Status.textContent = '❌ 失败';
        translateStep2Desc.textContent = String(err.message || err);
        if (translateStep3Status.textContent === '⏳ 等待中') {
          translateStep3Status.textContent = '⏸️ 未开始';
          translateStep3Desc.textContent = '上一步失败，未进入校对阶段';
        }
        translateProgressText.textContent = '本次翻译未完成，请确认后关闭弹窗。';
        translateProgressSummary.textContent = `📊 失败原因：${err.message || err}`;
        translateProgressConfirmBtn.style.display = 'inline-flex';
      } finally {
        aiTranslateBtn.disabled = false;
        aiTranslateBtn.textContent = originalText;
      }
    });

    translateProgressConfirmBtn.addEventListener('click', () => {
      hideTranslateProgress();
    });

    testConnectionBtn.addEventListener('click', async () => {
      const originalText = testConnectionBtn.textContent;
      testConnectionBtn.disabled = true;
      testConnectionBtn.textContent = '检测中...';
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 12000);
        try {
          const resp = await fetch('/api/health', { signal: controller.signal });
          if (resp.ok) {
            alert('连接测试成功：AI 接口可访问');
            return;
          }
          const errText = await resp.text();
          if (resp.status === 401 || resp.status === 403) {
            alert(`连接失败：鉴权异常（${resp.status}）\n请检查 ai-config.local.js 中的 apiKey`);
            return;
          }
          if (resp.status === 404) {
            alert('连接失败：接口路径不存在（404）\n请检查 ai-config.local.js 中的 endpoint');
            return;
          }
          if (resp.status === 429) {
            alert('连接失败：请求受限（429），请检查计费/配额/速率限制');
            return;
          }
          alert(`连接失败：HTTP ${resp.status}\n${errText}`);
        } finally {
          clearTimeout(timeout);
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          alert('连接失败：请求超时，请检查网络或代理可达性');
        } else if (String(err.message || '').includes('Failed to fetch') || String(err.message || '').includes('NetworkError')) {
          alert('连接失败：本地服务不可达，请确认已启动 node server.js');
        } else {
          alert(`连接失败：${err.message || err}`);
        }
      } finally {
        testConnectionBtn.disabled = false;
        testConnectionBtn.textContent = originalText;
      }
    });

    exportResultBtn.addEventListener('click', () => {
      if (isExporting) return;
      const exportableRows = getExportableRows();
      if (!exportableRows.length) {
        alert('当前没有可导出的翻译结果');
        return;
      }
      isExporting = true;
      const originalText = exportResultBtn.textContent;
      exportResultBtn.disabled = true;
      exportResultBtn.textContent = '导出中...';
      try {
        const headers = ['key', 'source_text', 'context_info', 'final_translation', 'source'];
        const lines = [headers.join(',')];
        exportableRows.forEach((row) => {
          const source = row.translationSource === 'lexicon'
            ? 'standard_lexicon'
            : row.translationSource === 'ai'
              ? 'ai'
              : '';
          const values = [
            row.key || '',
            row.source || '',
            row.context || '',
            row.finalTranslation || '',
            source
          ].map(toCsvField);
          lines.push(values.join(','));
        });
        const csvContent = `\uFEFF${lines.join('\n')}`;
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
        const a = document.createElement('a');
        a.href = url;
        a.download = `翻译结果_${ts}.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert(`导出失败：${err.message || err}`);
      } finally {
        isExporting = false;
        exportResultBtn.textContent = originalText;
        updateExportButtonState();
      }
    });

    clearEntriesBtn.addEventListener('click', () => {
      if (!loadedRows.length) return;
      const count = loadedRows.length;
      if (!window.confirm(`将清空当前批次共 ${count} 条词条，此操作不可恢复。是否继续？`)) return;
      if (!window.confirm('请再次确认：确定清空当前批次词条吗？')) return;
      loadedRows = [];
      searchKeyword = '';
      searchInput.value = '';
      resetSelectionUI();
      renderCurrentRows();
      updateExportButtonState();
    });

    searchInput.addEventListener('input', (e) => {
      searchKeyword = e.target.value || '';
      renderCurrentRows();
    });

    updateExportButtonState();
  </script>
</body>
</html>
